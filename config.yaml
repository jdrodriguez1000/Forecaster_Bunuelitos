# Forecaster Buñuelitos Configuration
# ---------------------------------------------------------
# Este archivo centraliza la orquestación y parámetros tácticos.
# Toda definición de tipos, rangos y leyes de datos reside en 
# schemas/contract/data_contract_latest.yaml (Single Truth).

general:
  project_name: Forecaster Buñuelitos
  random_state: 42
  base_path: "."
  data_raw_path: "data/01_raw"
  data_cleansed_path: "data/02_cleansed"
  data_features_path: "data/03_features"
  data_processed_path: "data/04_processed"
  outputs_path: "outputs"
  tests_reports_path: "tests/reports"
  mode: "load" # Opciones: load, train, forecast
  target_variable: demanda_teorica_total
  prediction_horizon: 185

extractions:
  db_type: supabase
  # Las tablas deben coincidir con los nombres en Supabase y el Contrato de Datos.
  tables: ["ventas", "inventario", "finanzas", "marketing", "macroeconomia", "clima"]

preprocessing:
  day_x_strategy: true
  imputation_rules:
    ventas: zero
    clima: interpolate
    macroeconomia: forward_fill

eda:
  generate_figures: true

features:
  calendars:
    - quincenas
    - primas
    - holidays
    - pandemic_flag
    - promos_2x1

modeling:
  champion_model: Ridge
  metrics:
    - MAPE
    - RMSE

forecast:
  horizon: 185
  aggregation: monthly

simulations:
  scenarios:
    - marketing_push
    - weather_extreme

monitoring:
  drift_threshold: 0.15 # Consistente con el contrato (15%)

